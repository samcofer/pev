schema_version: 1
checks:
  - id: connect.binary.present
    title: rstudio-connect binary is installed
    severity: info
    tags: [connect, install]
    applies_to:
      products: [connect]
    why: |
      Detects whether Connect has been installed. Reported informational so a
      fresh prereq run on an empty box still produces a clean report.
    references:
      - https://docs.posit.co/connect/admin/getting-started/local-install/server-install/index.html
    primitive: file
    with:
      path: /opt/rstudio-connect/bin/rstudio-connect
      must_exist: true
