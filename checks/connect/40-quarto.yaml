schema_version: 1
checks:
  - id: connect.quarto.present
    title: Quarto is installed on the Connect host
    severity: warning
    tags: [quarto, connect]
    applies_to:
      products: [connect]
    why: |
      Connect renders Quarto content server-side. Without quarto installed
      and configured under [Quarto] Executable in rstudio-connect.gcfg, Quarto
      content fails to deploy. Workbench and Connect should run the same
      Quarto version to avoid render discrepancies between dev and prod.
    references:
      - https://docs.posit.co/connect/admin/quarto/index.html
    primitive: cmd
    with:
      cmd: "ls /opt/quarto/*/bin/quarto 2>/dev/null"
      expect_exit: 0
