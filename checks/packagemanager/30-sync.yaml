schema_version: 3
checks:
  - id: ppm.egress.sync
    title: Package Manager can reach the Posit Package Service
    short_description: Probing egress to rspm-sync.rstudio.com
    tags: [network, egress, packagemanager]
    applies_to:
      products: [packagemanager]
    why: |
      Without rspm-sync.rstudio.com PPM cannot sync CRAN/PyPI metadata.
      Air-gapped environments have a separate offline workflow — flag early.
    references:
      - https://docs.posit.co/rspm/admin/getting-started/requirements.html#network
    primitive: http
    with:
      url: https://rspm-sync.rstudio.com/
      timeout_seconds: 10
