schema_version: 1
checks:
  - id: ppm.binary.present
    title: rstudio-pm binary is installed
    severity: info
    tags: [packagemanager, install]
    applies_to:
      products: [packagemanager]
    why: |
      Detects whether Package Manager has been installed. Informational so a
      fresh prereq run still produces a clean report.
    references:
      - https://docs.posit.co/rspm/admin/getting-started/installation/installing-ppm.html
    primitive: file
    with:
      path: /opt/rstudio-pm/bin/rstudio-pm
      must_exist: true
