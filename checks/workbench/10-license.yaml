schema_version: 1
checks:
  - id: workbench.license.activated
    title: Workbench license is activated
    severity: blocking
    tags: [license, workbench]
    applies_to:
      products: [workbench]
    requires_root: true
    why: |
      `rstudio-server license-manager status` must report "Status: Activated".
      Without an active license, rserver will not start sessions.
    references:
      - https://docs.posit.co/ide/server-pro/admin/license_management/license_management.html#license-status
    primitive: cmd
    with:
      cmd: "rstudio-server license-manager status"
      expect_exit: 0
      expect_stdout_regex: 'Status:\s+Activated'

  - id: workbench.license.file-present
    title: Workbench license file present in /var/lib/rstudio-server (if used)
    severity: info
    tags: [license, workbench]
    applies_to:
      products: [workbench]
    requires_root: true
    why: |
      A .lic file in /var/lib/rstudio-server overrides any license-key
      activation. We surface its presence informationally so the SE can
      confirm which licensing method is in effect.
    references:
      - https://docs.posit.co/ide/server-pro/admin/license_management/license_management.html#license-file
    primitive: dir
    with:
      path: /var/lib/rstudio-server
      glob: "*.lic"
      glob_min_matches: 1
