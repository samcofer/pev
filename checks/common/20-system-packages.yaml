schema_version: 1
checks:
  - id: pkg.gdebi.ubuntu
    title: gdebi-core installed (Ubuntu)
    severity: warning
    tags: [packages, ubuntu]
    applies_to:
      os: [ubuntu-22.04, ubuntu-24.04]
    why: |
      gdebi resolves dependencies when installing the .deb packages for
      Workbench, Connect, and Package Manager. Without it, dpkg installs
      can fail mid-flight and leave the system half-configured.
    primitive: pkg
    with:
      manager: dpkg
      any_of: [gdebi-core]

  - id: pkg.openssl-dev
    title: openssl development headers installed
    severity: warning
    tags: [packages, build-deps]
    applies_to:
      products: [workbench, connect, packagemanager]
    why: |
      Many R and Python packages compile against libssl. Missing headers cause
      cryptic install failures for end users post-launch.
    primitive: pkg
    with:
      manager: auto
      any_of: [libssl-dev, openssl-devel]

  - id: pkg.libcurl-dev
    title: libcurl development headers installed
    severity: warning
    tags: [packages, build-deps]
    applies_to:
      products: [workbench, connect, packagemanager]
    why: |
      Required by R packages such as curl and httr for HTTP work; Python's
      pycurl needs the same. Missing headers fail at compile time.
    primitive: pkg
    with:
      manager: auto
      any_of: [libcurl4-openssl-dev, libcurl-devel]

  - id: pkg.libxml2-dev
    title: libxml2 development headers installed
    severity: warning
    tags: [packages, build-deps]
    applies_to:
      products: [workbench, connect, packagemanager]
    why: |
      Required by R's xml2/XML packages and Python's lxml. Among the most
      common silent dependencies for analytics workloads.
    primitive: pkg
    with:
      manager: auto
      any_of: [libxml2-dev, libxml2-devel]
