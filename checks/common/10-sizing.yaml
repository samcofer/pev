schema_version: 1
checks:
  - id: sizing.workbench.minimum
    title: Host meets Workbench minimum sizing (4 cores / 8 GB / 100 GB)
    severity: warning
    tags: [sizing, workbench]
    applies_to:
      products: [workbench]
    why: |
      Posit Workbench requires at least 4 CPU cores, 8 GB RAM, and 100 GB disk.
      Under-provisioning is the most common cause of post-install performance issues.
      Plan for 2–4 GB of RAM per concurrent user.
    references:
      - https://docs.posit.co/ide/server-pro/admin/getting_started/requirements.html
    primitive: sizing
    with:
      cpus_min: 4
      mem_gb_min: 8
      disk_gb_min: { /: 100 }

  - id: sizing.connect.minimum
    title: Host meets Connect minimum sizing (4 GB / 100 GB)
    severity: warning
    tags: [sizing, connect]
    applies_to:
      products: [connect]
    why: |
      Posit Connect requires at least 4 GB RAM and 100 GB disk; CPU is not
      strictly bounded but Connect content runs in-process and benefits from
      additional cores.
    references:
      - https://docs.posit.co/connect/admin/getting-started/requirements/index.html
    primitive: sizing
    with:
      mem_gb_min: 4
      disk_gb_min: { /: 100 }

  - id: sizing.packagemanager.recommended
    title: Host meets Package Manager recommended sizing (4 cores / 16 GB / 500 GB)
    severity: warning
    tags: [sizing, packagemanager]
    applies_to:
      products: [packagemanager]
    why: |
      A full CRAN mirror exceeds 150 GB and grows continuously; Posit recommends
      4 cores, 16 GB RAM, and 500 GB disk for production Package Manager
      installs. Running out of disk mid-sync corrupts the repository.
    references:
      - https://docs.posit.co/rspm/admin/getting-started/requirements.html
    primitive: sizing
    with:
      cpus_min: 4
      mem_gb_min: 16
      disk_gb_min: { /: 500 }
