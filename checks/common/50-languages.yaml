schema_version: 2
# Language toolchain prereqs that apply to every Posit product. Posit's
# reproducibility model expects R/Python at /opt/<lang>/<version>/bin/<bin>
# regardless of which product runs on the host (Workbench needs R for IDE
# sessions; Connect runs R/Python for content; Package Manager mirrors
# CRAN/PyPI). Quarto is rendered both by Workbench sessions and by Connect.
checks:
  - id: lang.r.versioned-install
    title: At least one R install at /opt/R/<version>/bin/R
    category: Product
    tags: [r]
    why: |
      Posit's reproducibility model expects versioned R installs under
      /opt/R/<version> so multiple R versions can coexist. Workbench's
      auto-scan reports findings to /var/lib/rstudio-server/r-versions on
      startup; Connect picks up the same versions for content rendering.
    references:
      - https://docs.posit.co/ide/server-pro/admin/r/installing_r.html
    primitive: dir
    with:
      path: /opt/R
      must_exist: true
      glob: "*/bin/R"
      glob_min_matches: 1

  - id: lang.python.versioned-install
    title: At least one Python install at /opt/python/<version>/bin/python3
    category: Product
    tags: [python]
    why: |
      Posit's reproducibility model expects versioned Python installs under
      /opt/python/<version>. Without them, Workbench projects pin against
      system Python and break across upgrades; Connect content fails to
      reproduce across deploys.
    references:
      - https://docs.posit.co/resources/install-python-uv.html
    primitive: dir
    with:
      path: /opt/python
      must_exist: true
      glob: "*/bin/python3"
      glob_min_matches: 1

  - id: lang.quarto.present
    title: Quarto is available on PATH
    category: Product
    tags: [quarto]
    why: |
      RStudio Pro sessions ship a bundled Quarto, but VS Code, Positron, and
      JupyterLab sessions need quarto on PATH. Connect renders Quarto content
      server-side. Posit recommends a versioned install at
      /opt/quarto/<version>/bin/quarto with a /usr/local/bin/quarto symlink
      for PATH visibility.
    references:
      - https://docs.posit.co/resources/install-quarto.html
    primitive: cmd
    with:
      cmd: "command -v quarto || ls /opt/quarto/*/bin/quarto 2>/dev/null"
      expect_exit: 0

  # User-install smoke tests. These verify the customer's *unprivileged*
  # users can actually use the toolchains pev just discovered. We use the
  # latest detected R / Python so the SE catches issues with the version
  # they will actually deploy with, not an old one. Each runs as
  # `unprivileged_user` (auto-detected when pev is non-root, prompted
  # when root).
  - id: lang.r.renv-user-install
    title: Unprivileged user can install renv with the latest R
    category: Product
    tags: [r, user-install]
    applies_to:
      requires: [r]
    why: |
      renv is the canonical R reproducibility tool at Posit. If a regular
      user can't install it, the customer will hit the same blocker on the
      first day of operations. Hits the host's latest /opt/R/<ver>/bin/R.
    references:
      - https://rstudio.github.io/renv/articles/renv.html
    primitive: cmd
    with:
      as_user: "{{ .Inputs.unprivileged_user }}"
      cmd: |
        D=$(mktemp -d) && export D && {{ .Facts.LatestR }} --vanilla --no-save --slave -e \
          'lib <- Sys.getenv("D"); install.packages("renv", repos="https://packagemanager.posit.co/cran/__linux__/{{ .Facts.PPMLinuxSlug }}/latest", lib=lib); library("renv", lib.loc=lib)'
      expect_exit: 0
      timeout_seconds: 120

  - id: lang.python.uv-venv
    title: Unprivileged user can create a uv venv with the latest Python
    category: Product
    tags: [python, user-install, uv]
    applies_to:
      requires: [python, uv]
    why: |
      uv is Posit's recommended Python venv tool. A failure here usually
      means /tmp is noexec, the user has no shell home directory, or PyPI
      egress is blocked — all install-blockers worth catching pre-flight.
    primitive: cmd
    with:
      as_user: "{{ .Inputs.unprivileged_user }}"
      cmd: |
        D=$(mktemp -d) && uv venv --python {{ .Facts.LatestPython }} "$D/.venv" && \
          "$D/.venv/bin/python" -c "import sys; print(sys.executable)"
      expect_exit: 0
      timeout_seconds: 60

  - id: lang.python.pip-venv
    title: Unprivileged user can create a venv via python -m venv + pip install
    category: Product
    tags: [python, user-install, pip]
    applies_to:
      # Only run when uv is NOT present — if both are present, the uv
      # check above is the more authoritative signal.
      requires: [python, pip]
    why: |
      When uv is unavailable, the fallback path is `python -m venv` plus
      `pip install`. This check fires only when uv is absent. Catches
      missing python3-venv (Ubuntu) and outbound PyPI blockers.
    primitive: cmd
    with:
      as_user: "{{ .Inputs.unprivileged_user }}"
      cmd: |
        D=$(mktemp -d) && {{ .Facts.LatestPython }} -m venv "$D/.venv" && \
          "$D/.venv/bin/pip" install --quiet --no-input pip setuptools wheel && \
          "$D/.venv/bin/python" -c "import pip, sys; print(sys.executable)"
      expect_exit: 0
      timeout_seconds: 120

  - id: lang.idp.metadata
    title: IdP metadata or discovery URL is reachable
    category: Identity
    tags: [auth, idp]
    why: |
      SAML metadata or OIDC discovery must be reachable from the host
      during configuration; auth misconfiguration is the most common
      single-session blocker per BCBS runbook lessons. Applies to any
      Posit product that consumes the customer's IdP (Workbench, Connect).
    primitive: http
    with:
      url: "{{ .Inputs.idp_metadata_url }}"
      timeout_seconds: 8
