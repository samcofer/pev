name: Feature request
description: New CLI capability, output format, or behavior.
title: "[feat] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the SE / customer workflow that hurts today.
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: Sketch the CLI flag, command, or output you'd like.
    validations: { required: false }
