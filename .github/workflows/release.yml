name: release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write   # cosign keyless signing
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # cosign-installer publishes point releases only (no floating @v4
      # tag exists). Pin to v3.10.1: cosign-installer v4.x defaults
      # `--new-bundle-format` on, which silently ignores the
      # `--output-signature` flag goreleaser still uses and then errors
      # out because no `--bundle` path was set. v3.10.1 ships the
      # previous cosign release where `--output-signature` produces the
      # same .sig blob the README's verify instructions reference. Bump
      # deliberately along with .goreleaser.yaml when refreshing.
      - uses: sigstore/cosign-installer@v3.10.1
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          # `latest` triggers a "locking to ~> v2" warning each release run;
          # pin explicitly so the version is visible in the workflow file.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Self-verify the signature we just produced. If goreleaser's signing
      # block ever silently regresses (--output-certificate dropped, wrong
      # artifact selector, etc.) this step fails and the release does NOT
      # publish the binaries downstream tooling can't verify.
      - name: Verify cosign signature on checksums
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          checksum="dist/pev_${version}_checksums.txt"
          test -f "$checksum"          || { echo "no checksums file at $checksum"; exit 1; }
          test -f "${checksum}.sig"    || { echo "no .sig at ${checksum}.sig"; exit 1; }
          test -f "${checksum}.pem"    || { echo "no .pem at ${checksum}.pem"; exit 1; }
          cosign verify-blob \
            --certificate "${checksum}.pem" \
            --signature   "${checksum}.sig" \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$checksum"
