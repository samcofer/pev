name: release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write   # cosign keyless signing
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # cosign-installer publishes point releases only — there is no
      # floating v4 tag, so a bare `@v4` resolves to "no such version"
      # at action setup time. Pin to the latest v4.x and bump
      # deliberately when refreshing.
      - uses: sigstore/cosign-installer@v4.1.2
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          # `latest` triggers a "locking to ~> v2" warning each release run;
          # pin explicitly so the version is visible in the workflow file.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
