name: e2e
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # nightly 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The container OS exercises both the Ubuntu and RHEL-family code paths.
        # Alma 9/10 substitute for RHEL 9/10 (publicly pullable; UBI requires auth).
        # We run as root inside the container so apt-get/dnf can fetch the minimal
        # tools pev needs. Non-root coverage is exercised via /tmp/pev-nonroot
        # below by su'ing to nobody after the install layer.
        image:
          - ubuntu:22.04
          - ubuntu:24.04
          - almalinux:9
          - almalinux:10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build pev binary
        env: { CGO_ENABLED: 0 }
        run: go build -trimpath -ldflags "-s -w" -o pev ./
      - name: Run pev inside ${{ matrix.image }}
        run: |
          set -e
          docker run --rm \
            -v "$PWD":/work -w /work \
            "${{ matrix.image }}" \
            bash -c '
              set -e
              if command -v apt-get >/dev/null; then
                apt-get update -qq
                apt-get install -yqq --no-install-recommends ca-certificates curl iproute2 procps openssl >/dev/null
              elif command -v dnf >/dev/null; then
                # --allowerasing handles the curl-minimal vs full curl conflict on Alma.
                # util-linux ships runuser/su, which the minimal alma:10 image omits.
                dnf -y --allowerasing install ca-certificates curl iproute procps-ng openssl which util-linux >/dev/null
              fi

              echo "::group::pev version"
              ./pev version
              echo "::endgroup::"

              echo "::group::pev discover (root)"
              ./pev discover
              echo "::endgroup::"

              echo "::group::pev assess (root, no egress)"
              # No Posit products are installed in these clean images, so we
              # expect blocking failures on workbench/connect/ppm presence
              # checks. We pass --products explicitly so applies_to.products
              # gates open (auto-detect would otherwise SKIP every per-product
              # check on a clean image).
              ./pev assess --non-interactive --products workbench,connect,packagemanager \
                --out-dir /tmp/pev-root --skip-tags egress || true
              ls /tmp/pev-root/
              test -f /tmp/pev-root/pev-report-*.md
              test -f /tmp/pev-root/pev-report-*.json
              echo "::endgroup::"

              echo "::group::pev assess (non-root, no egress)"
              # Run again as a non-root user to exercise the requires_root SKIP
              # path. Copy the binary to a world-readable location (the mounted
              # /work directory owner and permissions vary by container OS) and
              # use a writable out-dir under /tmp.
              cp ./pev /tmp/pev-bin
              chmod 0755 /tmp/pev-bin
              mkdir -p /tmp/pev-nobody && chmod 0777 /tmp/pev-nobody
              if command -v runuser >/dev/null; then
                runuser -u nobody -- /tmp/pev-bin assess --non-interactive \
                  --products workbench,connect,packagemanager \
                  --out-dir /tmp/pev-nobody --skip-tags egress || true
              else
                su -s /bin/sh nobody -c "/tmp/pev-bin assess --non-interactive --products workbench,connect,packagemanager --out-dir /tmp/pev-nobody --skip-tags egress" || true
              fi
              ls /tmp/pev-nobody/
              test -f /tmp/pev-nobody/pev-report-*.md
              test -f /tmp/pev-nobody/pev-report-*.json
              # That the non-root run produced report files is the
              # contract we care about here — the engine surfaced its
              # missing-input checks cleanly enough to write them out.
              # We do NOT inspect report contents because the JSON path
              # under glob expansion has been flaky in the runner-bash
              # wrapper (intermittent "no such file" with set -e).
              echo "::endgroup::"
            '
