name: codeql
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule:
    - cron: "21 5 * * 1"   # weekly Monday 05:21 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

# CodeQL needs the repository's "Code scanning" feature to be enabled in
# Settings → Code security to upload SARIF results. On a fresh fork or a
# personal repo this is off by default; the workflow runs successfully but
# the SARIF-upload step inside analyze@v4 errors out. We soft-fail only
# that step so init/autobuild failures still block the job — those are
# real CodeQL regressions, not the "code scanning is off" config gap.
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
